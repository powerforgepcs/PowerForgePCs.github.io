<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerForge PCs | Custom PC Consultation</title>
    <style>
        :root {
            --bg-color: #0f1115;
            --card-bg: #161920;
            --accent-color: #0070f3;
            --accent-hover: #0056b3;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --border-color: #242936;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 10px;
            background: linear-gradient(to right, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Image Gallery Showcase */
        .gallery-section {
            max-width: 800px;
            margin: 0 auto 40px auto;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .gallery-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item img:hover {
            transform: scale(1.05);
        }

        /* Form Layout */
        .quote-form-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            max-width: 600px;
            margin: 0 auto 60px auto;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .quote-form-section h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .quote-form-section p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #e2e8f0;
        }

        input[type="number"],
        input[type="email"],
        select,
        textarea {
            width: 100%;
            padding: 12px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 0.95rem;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea {
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: var(--accent-hover);
        }

        .submit-btn:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 0.85rem;
            border-top: 1px solid var(--border-color);
            max-width: 800px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <h1>PowerForge PCs</h1>
        <p>Premium Performance Builds & Expert Component Optimization</p>
    </header>

    <section class="gallery-section">
        <div class="gallery-grid">
            <div class="gallery-item"><img src="pc1.jpg" alt="Custom Build Showcase 1"></div>
            <div class="gallery-item"><img src="pc2.jpg" alt="Custom Build Showcase 2"></div>
            <div class="gallery-item"><img src="pc3.jpg" alt="Custom Build Showcase 3"></div>
            <div class="gallery-item"><img src="pc4.jpg" alt="Custom Build Showcase 4"></div>
        </div>
    </section>

    <section class="quote-form-section" id="quote">
        <h2>Get a Custom PC Quote</h2>
        <p>Tell me what you need, and I'll optimize the perfect parts list for your budget.</p>
        
        <form id="pc-quote-form">
            <input type="hidden" name="access_key" value="db7831c0-a938-437e-927b-af591e92d8e5">

            <div class="form-group">
                <label for="budget">What is your exact budget (AUD)?</label>
                <input type="number" id="budget" name="budget" placeholder="e.g. 1500" required>
            </div>

            <div class="form-group">
                <label for="use-case">What will you primarily use the PC for?</label>
                <select id="use-case" name="use-case" required>
                    <option value="" disabled selected>Select your main use...</option>
                    <option value="esports">Competitive Esports (Fortnite, Valorant, high FPS)</option>
                    <option value="aaa-gaming">4K / Heavy AAA Gaming (Cyberpunk, GTA, Max Settings)</option>
                    <option value="streaming-editing">Streaming / Video Editing / Content Creation</option>
                    <option value="general-school">General Use / Schoolwork / Light Gaming</option>
                </select>
            </div>

            <div class="form-group">
                <label for="aesthetic">Aesthetic Preference</label>
                <select id="aesthetic" name="aesthetic" required>
                    <option value="" disabled selected>Select a style...</option>
                    <option value="stealth-black">Stealth Black (No RGB, clean and quiet)</option>
                    <option value="all-white">All-White Build</option>
                    <option value="max-rgb">Maximum RGB (Flashy lights, customizable)</option>
                    <option value="performance-first">Performance First (All budget into specs, style doesn't matter)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="notes">Any specific requirements or specific games you play?</label>
                <textarea id="notes" name="notes" rows="4" placeholder="e.g. Needs Wi-Fi, mostly playing Warzone, prefer AMD over NVIDIA..."></textarea>
            </div>

            <div class="form-group">
                <label for="email">Your Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">Submit Request</button>
            <div id="form-result" style="margin-top: 15px; font-size: 14px; font-weight: 600; text-align: center;"></div>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 PowerForge PCs. Expert Custom PC Consultation & Optimization.</p>
    </footer>

    <script>
        document.getElementById('pc-quote-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const form = e.target;
            const button = document.getElementById('submit-btn');
            const resultDiv = document.getElementById('form-result');
            
            button.disabled = true;
            button.innerText = "Sending...";
            resultDiv.style.color = "#aaaaaa";
            resultDiv.innerText = "Processing your request...";

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                let res = await response.json();
                if (response.status == 200) {
                    resultDiv.style.color = "#00cc7a";
                    resultDiv.innerText = "Quote request submitted successfully! Check your inbox soon.";
                    form.reset();
                } else {
                    console.log(response);
                    resultDiv.style.color = "#ff4444";
                    resultDiv.innerText = res.message || "Submission failed. Please try again.";
                }
            })
            .catch(error => {
                console.log(error);
                resultDiv.style.color = "#ff4444";
                resultDiv.innerText = "A network error occurred. Please try again later.";
            })
            .then(() => {
                button.disabled = false;
                button.innerText = "Submit Request";
            });
        });
    </script>
</body>
</html>
